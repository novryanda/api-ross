# ============================================================
# ROSS/BuzzTrack – Backend API
# Database is an existing PostgreSQL instance (Dokploy/external)
# All export files stored in Cloudflare R2 — no local volumes.
# Env vars dikelola via Dokploy panel → injected sebagai ${VAR}.
# ============================================================

services:
  ross-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}

      # ── Startup flags ──────────────────────────────────────
      RUN_MIGRATE_ON_STARTUP: ${RUN_MIGRATE_ON_STARTUP}
      RUN_SEED_ON_STARTUP: ${RUN_SEED_ON_STARTUP}

      # ── Seed config ────────────────────────────────────────
      SEED_ORG_NAME: ${SEED_ORG_NAME}
      SEED_ORG_SLUG: ${SEED_ORG_SLUG}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}

      # ── Export / R2 ────────────────────────────────────────
      EXPORT_PROCESSING_TIMEOUT_MINUTES: ${EXPORT_PROCESSING_TIMEOUT_MINUTES}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      R2_FORCE_PATH_STYLE: ${R2_FORCE_PATH_STYLE}
    expose:
      - '${PORT:-3001}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:${PORT:-3001}/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

# Sesuaikan nama network dengan output `docker network ls` di VPS
networks:
  dokploy-network:
    external: true
